<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LOGAPONT - Controle Operacional</title>

    <!-- Tailwind CSS Play CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        primary: '#6366f1',
                        secondary: '#ec4899',
                        dark: '#0f172a',
                        success: '#10b981',
                        warning: '#f59e0b',
                        danger: '#ef4444',
                    }
                }
            }
        }
    </script>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;600;700&display=swap"
        rel="stylesheet">

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- SheetJS (Excel) -->
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    <!-- Chart.js (Dashboards) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Custom Styles -->
    <link rel="stylesheet" href="css/styles.css">

    <style>
        body {
            font-family: 'Inter', sans-serif;
        }

        h1,
        h2,
        h3,
        .brand-font {
            font-family: 'Outfit', sans-serif;
        }
    </style>
</head>

<!-- ====================================================
     Firebase SDK v8 (COMPAT) - Mesmo padrão dos projetos
     LogAgend e LogTransf que funcionam em produção
     ==================================================== -->
<!-- Firebase App (base) -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<!-- Firebase Auth -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<!-- Firebase Firestore -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<body class="bg-gray-50 text-slate-900 dark:bg-dark dark:text-white transition-colors duration-300">

    <!-- Loading Inicial -->
    <div id="initial-loading" class="fixed inset-0 z-[100] bg-white flex flex-col items-center justify-center">
        <div class="w-14 h-14 border-4 border-indigo-100 border-t-indigo-600 rounded-full animate-spin mb-4"></div>
        <p class="text-[10px] font-bold uppercase tracking-widest text-slate-400 animate-pulse">Iniciando LOGAPONT...
        </p>
    </div>

    <!-- Container de Login -->
    <div id="login-screen" class="hidden fixed inset-0 z-50 flex items-center justify-center bg-slate-100 dark:bg-dark">
        <!-- Content injected by auth.js -->
    </div>

    <!-- App Shell (Hidden by default) -->
    <div id="app-shell" class="hidden min-h-screen flex flex-col md:flex-row">
        <!-- Sidebar Navigation -->
        <aside id="sidebar"
            class="w-full md:w-64 bg-white dark:bg-slate-900 border-r border-gray-200 dark:border-slate-800 flex flex-col transition-all duration-300">
            <!-- Content injected by app.js -->
        </aside>

        <!-- Main Content -->
        <main class="flex-1 flex flex-col overflow-hidden">
            <!-- Topbar -->
            <header id="topbar"
                class="h-16 bg-white dark:bg-slate-900 border-b border-gray-200 dark:border-slate-800 flex items-center justify-between px-6">
                <!-- Content injected by app.js -->
            </header>

            <!-- Dashboard / Viewport -->
            <div id="main-content" class="flex-1 overflow-auto p-4 md:p-6 bg-slate-50 dark:bg-slate-950">
                <!-- Content injected by modules -->
            </div>
        </main>
    </div>

    <!-- Modals Container -->
    <div id="modal-container"></div>

    <!-- App Scripts (carregam APÓS o Firebase compat acima) -->
    <script src="js/utils.js"></script>
    <script src="js/firebase-config.js"></script>
    <script src="js/store.js"></script>
    <script src="js/services/movimentacaoService.js"></script>

    <!-- Modules -->
    <script src="js/modules/auth.js"></script>
    <script src="js/modules/kanban.js"></script>
    <script src="js/modules/details.js"></script>
    <script src="js/modules/admin.js"></script>
    <script src="js/modules/indicadores.js"></script>
    <script src="js/modules/produtos.js"></script>
    <script src="js/modules/movimentacao.js"></script>

    <!-- Entry Point -->
    <script src="js/app.js"></script>

</body>

</html>
